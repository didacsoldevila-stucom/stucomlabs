services:
  wordpress:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_password
      DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_MEMORY_LIMIT', '256M');
        define('WP_MAX_MEMORY_LIMIT', '256M');
        define('FORCE_SSL_ADMIN', true);
        define('DISALLOW_FILE_EDIT', true);
        define('AUTOMATIC_UPDATER_DISABLED', false);
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}

    volumes:
      - wp_html:/var/www/html

    labels:
      - traefik.enable=true
      # Router principal (normal)
      - traefik.http.routers.wordpress-lab.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.wordpress-lab.entrypoints=https
      - traefik.http.routers.wordpress-lab.tls=true
      - traefik.http.routers.wordpress-lab.service=wordpress-lab
      - traefik.http.services.wordpress-lab.loadbalancer.server.port=80
      # Router SOLO para wp-login
      - traefik.http.routers.wordpress-lab-login.rule=Host(`${DOMAIN}`) && Path(`/wp-login.php`)
      - traefik.http.routers.wordpress-lab-login.entrypoints=https
      - traefik.http.routers.wordpress-lab-login.tls=true
      - traefik.http.routers.wordpress-lab-login.priority=100
      - traefik.http.routers.wordpress-lab-login.service=wordpress-lab
      - traefik.http.routers.wordpress-lab-login.middlewares=wordpress-lab-login-ratelimit
      # Rate limit DURO solo para login
      - traefik.http.middlewares.wordpress-lab-login-ratelimit.ratelimit.average=3
      - traefik.http.middlewares.wordpress-lab-login-ratelimit.ratelimit.burst=5

  wpcli:
    build:
      context: .
      dockerfile: Dockerfile.wpcli
    user: "33:33"
    working_dir: /var/www/html
    command: ["/scripts/bootstrap.sh"]
    restart: "no"

    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      HOME: /tmp
      DOMAIN: ${DOMAIN}
      WP_TITLE: ${WP_TITLE}
      STUDENT_CODE: ${STUDENT_CODE}
      STUDENT_NAME: ${STUDENT_NAME}
      STUDENT_SURNAME: ${STUDENT_SURNAME}
      STUDENT_EMAIL: ${STUDENT_EMAIL}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      ELEMENTOR_PRO_URL: ${ELEMENTOR_PRO_URL}
      ELEMENTOR_PRO_LICENSE: ${ELEMENTOR_PRO_LICENSE}
    volumes:
      - wp_html:/var/www/html

volumes:
  wp_html: